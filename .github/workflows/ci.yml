name: Kɔntena CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  gateway-test:
    name: Gateway — Go Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: gateway/go.sum

      - name: Build gateway
        run: cd gateway && mkdir -p bin && go build -o bin/gateway ./cmd/server/

      - name: Run tests
        run: cd gateway && go test ./... -v

  android-lint:
    name: Android — Flutter Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: cd android_client && flutter pub get

      - name: Patch vosk_flutter namespace (AGP 9.x compat)
        run: |
          VOSK_BUILD=$(find ~/.pub-cache -path "*/vosk_flutter-*/android/build.gradle" | head -1)
          if [ -n "$VOSK_BUILD" ]; then
            echo "Patching $VOSK_BUILD"
            # Add namespace (AGP 9.x requirement)
            sed -i '/^android {/a\    namespace "com.example.vosk_flutter"' "$VOSK_BUILD"
            # Remove hardcoded AGP buildscript version (let root project manage it)
            sed -i '/classpath .com.android.tools.build:gradle:/d' "$VOSK_BUILD"
            echo "--- Patched vosk_flutter build.gradle ---"
            cat "$VOSK_BUILD"
          else
            echo "ERROR: vosk_flutter build.gradle not found"
            exit 1
          fi

      - name: Flutter analyze
        run: cd android_client && flutter analyze

      - name: Flutter test
        run: cd android_client && flutter test

      - name: Build debug APK
        id: build
        run: |
          cd android_client
          set +o pipefail
          flutter build apk --debug --verbose 2>&1 | tee apk_build.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "::error::BUILD FAILED (exit code $exit_code)"
            echo "--- LAST 80 LINES OF BUILD OUTPUT ---"
            tail -80 apk_build.log
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Build failed (exit code $exit_code)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(FAILED|ERROR|error:|Error|BUILD FAILED|What went wrong|Could not|Cannot|not found|Missing)" apk_build.log | tail -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $exit_code

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kontena-debug-apk
          path: android_client/**/*.apk
          retention-days: 7

      - name: Upload build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_client/apk_build.log
          retention-days: 7
